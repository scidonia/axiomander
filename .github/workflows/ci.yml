name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cvc4 eprover libssl-dev libev-dev

      - name: Install Coq deps (opam)
        # NOTE: This step intentionally uses `opam pin` and `opam install`.
        # AGENTS.md rule: "Never opam pin/opam install without asking first."
        # Deviation approved by maintainer (Jeremy Zucker, 2026-06-19) because:
        #   1. It mirrors exactly what `make setup-coq` already does locally.
        #   2. It pins the already-vendored vendor/coqhammer submodule — no new
        #      toolchain version is introduced.
        #   3. `libcoq-hammer-dev` does not exist as an apt package; opam is the
        #      only supported install path for coq-hammer on this toolchain.
        run: |
          opam pin add -n -y coq-hammer-tactics vendor/coqhammer
          opam pin add -n -y coq-hammer vendor/coqhammer
          opam install -y --deps-only .

      - name: Install Python deps
        run: pip install pytest

      - name: Build Coq
        run: |
          eval $(opam env)
          dune build

      - name: Run tests
        run: |
          eval $(opam env)
          PYTHONPATH=py python -m pytest py/tests/ -v
