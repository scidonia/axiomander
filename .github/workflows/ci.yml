name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y coq cvc4 eprover libssl-dev libev-dev

      - name: Add Rocq/Iris opam repo + install Coq deps
        run: |
          opam repo add coq-released https://coq.inria.fr/opam/released || true
          opam update
          opam install -y rocq-iris rocq-stdpp coq-hammer

      - name: Install Python deps
        run: pip install pytest pydantic hypothesis

      - name: Build Coq
        run: |
          eval $(opam env)
          dune build

      - name: Build Coq test deps
        run: |
          eval $(opam env)
          coqc -R coq "" coq/ListPredicates.v
          coqc -R coq "" coq/SnakeletLang.v
          coqc -R coq "" coq/SnakeletEval.v
          coqc -R coq "" coq/SnakeletExnLang.v
          coqc -R coq "" coq/SnakeletExnWp.v
          coqc -R coq "" coq/SnakeletExnTactics.v

      - name: Run tests
        run: |
          eval $(opam env)
          PYTHONPATH=. python -m pytest py/tests/ -v
